<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription Formation</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    /* (Garde le même CSS que précédemment) */
  </style>
</head>
<body>
  <!-- (Garde le même HTML que précédemment) -->

  <script>
    let currentDispositif = null;
    let allEnseignants    = {};
    let allEnd            = {};
    let allEcoles         = {};
    let selectedSchool    = '';

    function toRows(data) {
      const ids  = data.id;
      const cols = Object.keys(data).filter(k => k !== 'id' && k !== 'manualSort');
      return ids.map((id, i) => {
        const row = { id };
        cols.forEach(c => { row[c] = data[c][i]; });
        return row;
      });
    }

    async function loadData() {
      try {
        const [ensData, endData, ecolesData] = await Promise.all([
          grist.docApi.fetchTable('Enseignants'),
          grist.docApi.fetchTable('Enseignants_Dispositifs'),
          grist.docApi.fetchTable('Écoles')
        ]);
        const ensRows = toRows(ensData);
        const endRows = toRows(endData);
        const ecolesRows = toRows(ecolesData);

        allEnseignants = {};
        ensRows.forEach(r => allEnseignants[r.id] = r);

        allEnd = {};
        endRows.forEach(r => allEnd[r.id] = r);

        // Créer un mapping Nom_raccourci → Denomination (en majuscules et sans espaces)
        allEcoles = {};
        ecolesRows.forEach(r => {
          if (r.Nom_raccourci) {
            const normalizedShortName = r.Nom_raccourci.toUpperCase().trim();
            allEcoles[normalizedShortName] = r.Denomination;
          }
        });

        // Normaliser les noms raccourcis dans les enseignants
        ensRows.forEach(r => {
          if (r.Ecole_rattachement) {
            r.Normalized_Ecole = r.Ecole_rattachement.toUpperCase().trim();
          }
        });

        populateSchools(ensRows);
        renderTeachers();
      } catch(e) {
        console.error('loadData error:', e);
        showStatus('Erreur de chargement des données', 'error');
      }
    }

    function populateSchools(rows) {
      const sel = document.getElementById('school-select');
      sel.innerHTML = '<option value="">-- Choisir une école --</option>';

      // Récupérer les noms raccourcis normalisés
      const schoolShortNames = [...new Set(
        rows.map(r => r.Normalized_Ecole)
          .filter(s => s && allEcoles[s])
      )].sort();

      console.log("Écoles disponibles:", schoolShortNames);
      console.log("Mapping des écoles:", allEcoles);

      schoolShortNames.forEach(s => {
        const o = document.createElement('option');
        o.value = s;
        o.textContent = allEcoles[s] || s;
        sel.appendChild(o);
      });

      if (schoolShortNames.length === 0) {
        const emptyOption = document.createElement('option');
        emptyOption.value = "";
        emptyOption.textContent = "-- Aucune école trouvée --";
        sel.appendChild(emptyOption);
      }
    }

    function getTeachers() {
      return Object.values(allEnseignants)
        .filter(e => e.Normalized_Ecole === selectedSchool)
        .sort((a, b) => (a.Nom_Prenom || '').localeCompare(b.Nom_Prenom || ''));
    }

    // (Garde les autres fonctions inchangées)
  </script>
</body>
</html>
